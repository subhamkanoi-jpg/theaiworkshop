<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(252,56%,57%)"/>
      <stop offset="100%" stop-color="hsl(174,72%,46%)"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(252,56%,98%)"/>
      <stop offset="100%" stop-color="hsl(174,72%,97%)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="260" fill="hsl(252,56%,57%)" opacity="0.10"/>
  <circle cx="1080" cy="560" r="300" fill="hsl(174,72%,46%)" opacity="0.10"/>

  <!-- Brand mark (top-left) -->
  <g transform="translate(80,72)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="0" y="-2" width="40" height="40" rx="11" fill="url(#brand)"/>
    <text x="20" y="25" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">A</text>
    <text x="56" y="27" font-size="26" font-weight="800" fill="hsl(222,47%,11%)">The AI Workshop</text>
  </g>

  <!-- "AI is for everyone" pill (top-right) -->
  <g transform="translate(880,74)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="240" height="40" rx="20" fill="hsl(252,56%,57%)" opacity="0.12"/>
    <text x="120" y="27" font-size="19" font-weight="700" fill="hsl(252,56%,50%)" text-anchor="middle">✦  AI is for everyone</text>
  </g>

  <!-- Workshop label -->
  <text x="80" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700"
        letter-spacing="2" fill="hsl(174,72%,40%)">WORKSHOP #01 · BUILD YOUR OWN WEBSITE</text>

  <!-- Headline -->
  <g font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="hsl(222,47%,11%)">
    <text x="80" y="295" font-size="68">Build &amp; launch</text>
    <text x="80" y="375" font-size="68" fill="url(#brand)">your own website</text>
    <text x="80" y="455" font-size="68">in one Sunday afternoon.</text>
  </g>

  <!-- Price row -->
  <g transform="translate(80,520)" font-family="Segoe UI, Arial, sans-serif">
    <text x="0" y="40" font-size="52" font-weight="800" fill="hsl(222,47%,11%)">₹799</text>
    <text x="150" y="36" font-size="30" font-weight="500" fill="hsl(220,9%,46%)">₹1,599</text>
    <line x1="150" y1="26" x2="262" y2="26" stroke="hsl(220,9%,46%)" stroke-width="2.5"/>
    <rect x="290" y="8" width="150" height="40" rx="20" fill="hsl(174,72%,46%)" opacity="0.15"/>
    <text x="365" y="35" font-size="20" font-weight="800" fill="hsl(174,72%,34%)" text-anchor="middle">SAVE 50%</text>
    <text x="490" y="36" font-size="24" font-weight="600" fill="hsl(220,9%,40%)">📍 Offline in Kolkata · Sun, 28 June 2026</text>
  </g>
</svg>
